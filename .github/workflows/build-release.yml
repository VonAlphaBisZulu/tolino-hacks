name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG="v$(date -u +%Y%m%d)-$(echo $GITHUB_SHA | head -c 7)"
            git tag "$TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ARM cross-compiler + rsvg-convert
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf librsvg2-bin

      - name: Render Mehr-menu icons (SVG -> PNG; nickel's QPixmap path
                                     uses the built-in PNG plugin, no SVG)
        run: |
          if [ -d icons ]; then
            for svg in icons/*.svg; do
              [ -f "$svg" ] || continue
              png="${svg%.svg}.png"
              rsvg-convert -w 64 -h 64 "$svg" -o "$png"
            done
            ls -la icons/
          fi

      - name: Build libtolinom.so (public variant — no reverse tunnel)
        env:
          TOLINOM_PUBLIC: "1"
        run: bash build.sh "$GITHUB_WORKSPACE"

      - name: Build dropbearmulti
        run: bash build-dropbear.sh "$GITHUB_WORKSPACE/dropbearmulti"

      - name: Verify artifacts
        run: |
          echo "=== libtolinom.so ==="
          file libtolinom.so
          ls -lh libtolinom.so
          echo "=== dropbearmulti ==="
          file dropbearmulti
          ls -lh dropbearmulti

      - name: Package update.tar (self-contained)
        run: |
          # Build self-contained update.tar with everything embedded.
          # The public release excludes the reverse-tunnel scripts and the
          # .env example — those belong to the personal variant.
          STAGING=$(mktemp -d)
          cp driver.sh "$STAGING/"
          chmod +x "$STAGING/driver.sh"
          mkdir -p "$STAGING/.adds"
          cp libtolinom.so "$STAGING/.adds/"
          cp dropbearmulti "$STAGING/.adds/"
          for f in scripts/*.sh; do
            case "$(basename "$f")" in
              cloud-*.sh) continue ;;
              *) cp "$f" "$STAGING/.adds/" ;;
            esac
          done
          chmod +x "$STAGING/.adds/"*.sh "$STAGING/.adds/dropbearmulti"

          # Ship the launcher and any built-in HTML apps. Each app lives at
          # apps/<name>/index.html (+ optional icon.svg/png).
          if [ -d apps ]; then
            mkdir -p "$STAGING/.adds/apps"
            cp -r apps/* "$STAGING/.adds/apps/"
          fi
          # Mehr-menu icons (gear for Tolino Hacks, grid for Apps).
          if [ -d icons ]; then
            mkdir -p "$STAGING/.adds/icons"
            cp -r icons/* "$STAGING/.adds/icons/"
          fi

          (cd "$STAGING" && tar cf "$GITHUB_WORKSPACE/update.tar" driver.sh .adds/)
          echo "update.tar contents:"
          tar tvf update.tar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Installation

            1. Connect device via USB
            2. Copy `update.tar` to the root of the device
            3. Eject and reboot — the device will process the update

            **After reboot:**
            - **Mehr → Tolino Hacks** opens the settings panel.
              Tap **SSH Server** to start dropbear; the panel shows
              `ssh -p 2222 root@<ip>` and the auto-generated password.
            - **Mehr → Apps** opens an HTML/CSS/JS app launcher
              (`QWebEngineView` inside a frameless dialog). Drop new apps
              at `/mnt/onboard/.adds/apps/<name>/index.html`.

            For key auth, place your public key as
            `.adds/authorized_keys` on the device via USB before
            applying the update.

            See [README](https://github.com/VonAlphaBisZulu/tolino-hacks/blob/main/README.md) for details.
          files: |
            update.tar
            libtolinom.so
            dropbearmulti
