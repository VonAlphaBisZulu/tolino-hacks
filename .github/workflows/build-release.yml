name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            TAG="v$(date -u +%Y%m%d)-$(echo $GITHUB_SHA | head -c 7)"
            git tag "$TAG"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Install ARM cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build libtolinom.so
        run: bash build.sh "$GITHUB_WORKSPACE"

      - name: Build dropbearmulti
        run: bash build-dropbear.sh "$GITHUB_WORKSPACE/dropbearmulti"

      - name: Verify artifacts
        run: |
          echo "=== libtolinom.so ==="
          file libtolinom.so
          ls -lh libtolinom.so
          echo "=== dropbearmulti ==="
          file dropbearmulti
          ls -lh dropbearmulti

      - name: Package update.tar (self-contained)
        run: |
          # Build self-contained update.tar with everything embedded
          STAGING=$(mktemp -d)
          cp driver.sh "$STAGING/"
          mkdir -p "$STAGING/.adds"
          cp libtolinom.so "$STAGING/.adds/"
          cp dropbearmulti "$STAGING/.adds/"
          cp .env.example "$STAGING/.adds/"
          cp scripts/*.sh "$STAGING/.adds/" 2>/dev/null || true
          (cd "$STAGING" && tar cf "$GITHUB_WORKSPACE/update.tar" driver.sh .adds/)
          echo "update.tar contents:"
          tar tf update.tar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Installation

            1. Connect device via USB
            2. Copy `update.tar` to the root of the device
            3. Eject and reboot — the device will process the update

            **After reboot:**
            - SSH: `ssh -p 2222 root@<device-ip>`
            - Default password: `tolinopass42`
            - Scripts menu: Mehr > Scripts

            SSH is restricted to local networks only (192.168.x, 10.x, 172.16-31.x).
            To use key auth instead, place your public key as `.adds/authorized_keys`
            on the device before applying the update.

            See [README](https://github.com/VonAlphaBisZulu/tolino-hacks/blob/main/README.md) for full documentation.
          files: |
            update.tar
            libtolinom.so
            dropbearmulti
