<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apps</title>
<style>
  /* Tolino UI uses Rakuten's thin sans. Bariol is the classic Tolino
     fallback (also installed); Noto Sans / DejaVu Sans cover anything else. */
  @font-face{font-family:"Tolino UI";font-weight:400;
    src:local("RakutenSansUIApp"),local("Rakuten Sans UI App"),
        url("file:///usr/share/fonts/RakutenSansUIApp-Regular.ttf") format("truetype")}
  @font-face{font-family:"Tolino UI";font-weight:700;
    src:local("RakutenSansUIApp Bold"),
        url("file:///usr/share/fonts/RakutenSansUIApp-Bold.ttf") format("truetype")}
  @font-face{font-family:"Tolino UI";font-weight:300;
    src:local("Bariol"),local("Bariol Light"),
        url("file:///usr/share/fonts/Bariol-Regular.otf") format("opentype")}

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;
    /* manipulation suppresses Chromium's 300ms wait-for-double-tap delay
       which was eating the first tile tap. */
    touch-action:manipulation}
  html,body{background:#fff;color:#000;height:100%;width:100%;overflow:hidden;
    font-family:"Tolino UI","Noto Sans","DejaVu Sans",sans-serif}
  /* 40px base — comfortable on 1072x1448 e-paper at arms length. */
  /* Top padding leaves room for nickel's status bar (~100px) so our
     header isn't covered when the launcher is pushed as an embedded
     view via MainWindowController::pushView. In dialog mode the
     padding lands inside the dialog frame — visually fine. */
  body{display:flex;flex-direction:column;font-size:40px;line-height:1.4;
       padding-top:100px}

  /* Header is the persistent system bar — sized to align with the
     overlaid native Qt close button (60px circle at y=16..75). */
  header{display:flex;align-items:center;
    padding:12px 24px;border-bottom:3px solid #000;
    background:#fff;flex-shrink:0;height:96px}
  header .back{font-size:1.5em;background:none;border:none;color:#000;
    padding:8px 18px;border-radius:8px;cursor:pointer;visibility:hidden;
    font-family:inherit;min-width:64px;font-weight:400}
  header .title{flex:1;font-size:1.4em;font-weight:400;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 16px;
    /* Reserve space on the right for the Qt overlay × so titles don't
       collide with it. */
    padding-right:96px}
  header .close:active,header .back:active{background:#000;color:#fff}

  main{flex:1;overflow:hidden;display:flex}

  #grid{display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:36px;padding:48px;width:100%;align-content:start;
    overflow-y:auto}

  a.tile{display:flex;flex-direction:column;align-items:center;
    text-decoration:none;color:#000;padding:40px 20px;
    border:3px solid #000;border-radius:18px;
    background:#fff;min-height:300px;justify-content:center;cursor:pointer}
  a.tile:active{background:#000;color:#fff}
  a.tile:active .icon{filter:invert(1)}
  /* The single-letter glyph stays large; the rest of the UI scaled up. */
  .icon{width:120px;height:120px;display:flex;align-items:center;
    justify-content:center;font-size:80px;margin-bottom:20px;
    background:transparent;border-radius:12px;font-weight:400}
  .icon img{max-width:100%;max-height:100%;object-fit:contain}
  .name{font-size:1.1em;font-weight:500;text-align:center;
    word-break:break-word;line-height:1.2}

  #appframe{width:100%;height:100%;border:0;display:none;background:#fff}

  .empty{grid-column:1/-1;text-align:center;padding:80px 24px;color:#666}
  .empty h2{font-size:1.6em;margin-bottom:18px;color:#000}
  .empty code{background:#eee;padding:6px 12px;border-radius:6px;
    font-family:"DejaVu Sans Mono",monospace;font-size:.95em;
    display:inline-block;margin-top:12px}
</style>
</head>
<body>

<header>
  <!-- The native Qt × overlay handles closing; HTML × removed. -->
  <button class="back" id="back" onclick="goBack()">←</button>
  <div class="title" id="title">Apps</div>
</header>

<main>
  <div id="grid"></div>
  <!-- No sandbox: an explicit attribute restricts even nested iframes
       (and our motsfleches app needs to load https:// content). -->
  <iframe id="appframe"></iframe>
</main>

<script>
const grid  = document.getElementById('grid');
const frame = document.getElementById('appframe');
const back  = document.getElementById('back');
const title = document.getElementById('title');
let lastTap = 0;

function defaultIcon(name) {
  const div = document.createElement('div');
  div.className = 'icon';
  div.textContent = (name[0] || '?').toUpperCase();
  return div;
}

function appIcon(app) {
  if (app.icon) {
    const div = document.createElement('div');
    div.className = 'icon';
    const img = document.createElement('img');
    img.src = app.icon;
    img.onerror = () => { div.textContent = (app.name[0] || '?').toUpperCase(); };
    div.appendChild(img);
    return div;
  }
  return defaultIcon(app.name);
}

function openApp(app) {
  grid.style.display = 'none';
  frame.src = app.path;
  frame.style.display = 'block';
  title.textContent = app.name;
  back.style.visibility = 'visible';
}

function goBack() {
  frame.src = 'about:blank';
  frame.style.display = 'none';
  grid.style.display = 'grid';
  title.textContent = 'Apps';
  back.style.visibility = 'hidden';
}

fetch('apps.json').then(r => r.json()).then(apps => {
  if (!apps.length) {
    grid.innerHTML = '<div class="empty"><h2>No apps installed</h2>' +
      '<p>Drop an app at:</p>' +
      '<code>/mnt/onboard/.adds/apps/&lt;name&gt;/index.html</code></div>';
    return;
  }
  for (const app of apps) {
    const a = document.createElement('a');
    a.className = 'tile';
    a.href = 'javascript:void(0)';
    // Fire on touchstart for snap response; preventDefault suppresses the
    // synthesised click so we don't double-fire. Time-based debounce
    // prevents accidental double-tap (and also sidesteps the closure-
    // variable bug we had where the second tap on the same tile after
    // returning via back was eaten by a stale "opened" flag).
    a.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const now = Date.now();
      if (now - lastTap < 400) return;
      lastTap = now;
      openApp(app);
    });
    a.addEventListener('click', () => {
      const now = Date.now();
      if (now - lastTap < 400) return;
      lastTap = now;
      openApp(app);
    });
    a.appendChild(appIcon(app));
    const n = document.createElement('div');
    n.className = 'name';
    n.textContent = app.name;
    a.appendChild(n);
    grid.appendChild(a);
  }
}).catch(e => {
  grid.innerHTML = '<div class="empty"><h2>Error loading apps</h2>' +
    '<p>' + e + '</p></div>';
});
</script>
</body>
</html>
