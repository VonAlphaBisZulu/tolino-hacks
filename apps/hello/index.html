<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hello Tolino</title>
<style>
  @font-face{font-family:"Tolino UI";font-weight:400;
    src:local("RakutenSansUIApp"),
        url("file:///usr/share/fonts/RakutenSansUIApp-Regular.ttf") format("truetype")}
  @font-face{font-family:"Tolino UI";font-weight:700;
    src:local("RakutenSansUIApp Bold"),
        url("file:///usr/share/fonts/RakutenSansUIApp-Bold.ttf") format("truetype")}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none}
  body{font-family:"Tolino UI","Noto Sans","DejaVu Sans",sans-serif;
       background:#fff;color:#000;margin:0;padding:48px;
       font-size:32px;line-height:1.5}
  h1{font-size:1.6em;border-bottom:3px solid #000;padding-bottom:16px;
     margin-bottom:24px;font-weight:700}
  p{margin-bottom:24px}
  code{background:#eee;padding:2px 8px;border-radius:4px;
       font-family:"DejaVu Sans Mono",monospace;font-size:.85em}
  button{font-family:inherit;font-size:1.1em;padding:18px 36px;margin:12px 0;
         background:#fff;color:#000;border:3px solid #000;
         border-radius:10px;cursor:pointer;display:block;width:100%;
         font-weight:500}
  button:active{background:#000;color:#fff}
  #out{margin-top:32px;padding:24px;border:2px solid #888;
       min-height:160px;max-height:520px;overflow-y:auto;
       font-family:"DejaVu Sans Mono",monospace;
       font-size:.85em;white-space:pre-wrap;user-select:text;
       -webkit-user-select:text;line-height:1.4}
  small{color:#666;font-size:.75em}
</style>
</head>
<body>
<h1>Hello Tolino</h1>
<p>This is a web app running inside a frameless <code>QDialog</code>
hosting <code>QWebEngineView</code>. The hook library injects an
&ldquo;Apps&rdquo; entry into Mehr; this page is just one of any
HTML/CSS/JS app dropped into <code>/mnt/onboard/.adds/apps/</code>.</p>

<button onclick="bump()">Tap me</button>
<button onclick="clock()">Show clock</button>
<button onclick="info()">User agent</button>
<button onclick="document.getElementById('out').textContent=''">Clear</button>

<div id="out"></div>

<small>file:///mnt/onboard/.adds/apps/hello/index.html</small>

<script>
let n = 0;
const out = document.getElementById('out');
function log(s){ out.textContent = s + '\n' + out.textContent; }
function bump(){ n++; log('Tapped ' + n + ' time' + (n!==1?'s':'')); }
function clock(){ log(new Date().toString()); }
function info(){ log(navigator.userAgent); }
</script>
</body>
</html>
